  abort_on_close: true
  disable_cache: true
  slop_detection:
    enabled: true
    label: review:slop
  auto_review:
    enabled: true
    description_keyword: "@coderabbitai review"
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords:
    - "[skip review]"
    labels: []
    drafts: true
    base_branches:
    - ".*"
    ignore_usernames: []
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: true
    custom:
    - enabled: true
      name: architecture hardening
      instructions: Refactor only changed code where doing so removes meaningful duplication,
        hidden fallback paths, tangled responsibilities, or brittle coupling. Preserve
        behavior unless the PR explicitly changes it. Prefer deleting bad indirection
        over adding wrappers. Include tests or note exactly why no test can cover
        the improvement.
    - enabled: true
      name: security pass
      instructions: Inspect the PR for secrets, injection risk, path traversal, unsafe
        deserialization, authz/authn drift, overbroad logging, unsafe dependency changes,
        and CI token permission expansion. Apply minimal fixes directly when safe;
        otherwise leave precise comments.
    - enabled: true
      name: test gap closure
      instructions: Generate focused tests for changed behavior and edge cases. Prefer
        existing test frameworks and fixtures. Do not create broad snapshot churn
        or tests that merely assert implementation details. Include regression tests
        for bugs and riskier boundary changes.
    - enabled: true
      name: docs and changelog alignment
      instructions: Update docs, README, AGENTS/CLAUDE guidance, generated reference
        docs, and changelog entries only where the PR changes user-visible behavior,
        public contracts, workflows, or agent instructions. Keep entries concise and
        consistent with repo rules.
    - enabled: true
      name: performance and allocation pass
      instructions: Review changed hot paths for avoidable allocations, repeated parsing,
        unbounded concurrency, N+1 calls, missing streaming/backpressure, and inefficient
        data structures. Apply low-risk improvements with tests or benchmarks where
        the repo already has them.
  pre_merge_checks:
    override_requested_reviewers_only: true
    docstrings:
      mode: warning
      threshold: 75
    title:
      mode: error
      requirements: Conventional commits with an area scope; under 72 characters;
        no trailing punctuation; accurately names the highest-impact change.
    description:
      mode: error
    issue_assessment:
      mode: warning
    custom_checks:
    - mode: error
      name: No Secrets Or PII
      instructions: 'Pass/fail criteria: fail if the PR adds secrets, tokens, credentials,
        private keys, real user data, personal data, API keys, connection strings,
        or logs that expose sensitive request/response bodies. Test placeholders are
        allowed only when obviously synthetic and documented.'
    - mode: error
      name: Generated Files Regenerated
      instructions: 'Pass/fail criteria: if a source schema/model/template/generator
        input changes, all generated downstream files required by the repository must
        be updated in the same PR. Fail if generated files appear hand-edited without
        the source generator/input change, or if generated output is missing after
        source-model changes.'
    - mode: error
      name: Async And Cancellation Safe
      instructions: 'Pass/fail criteria: fail C#/TS/Python changes that introduce
        sync-over-async, unobserved fire-and-forget work, missing CancellationToken/AbortSignal
        propagation on public/internal async boundaries, sleeps for synchronization,
        or resource disposal paths that can drop in-flight work.'
    - mode: error
      name: Public Contract Documented
      instructions: 'Pass/fail criteria: fail if public APIs, endpoint schemas, CLI
        flags, config keys, package surfaces, storage formats, event schemas, MCP
        tool schemas, or generated contracts change without matching docs/tests and
        explicit compatibility notes in the PR description or changelog where the
        repo uses one.'
    - mode: error
      name: CI Release Safety
      instructions: 'Pass/fail criteria: if no workflow/build/release files changed,
        pass. Fail when a changed workflow removes an existing validation job, removes
        concurrency from push/PR workflows, adds --admin/force-push/bypass commands,
        increases token permissions beyond contents:read without inline rationale,
        exposes secrets in command arguments/logs, changes publish triggers to run
        outside tags or approved environments, or allows a previously required failing
        check to be ignored.'
    - mode: warning
      name: Tests Match Risk
      instructions: 'Pass/fail criteria: warn when production behavior changes without
        focused tests or when tests only assert implementation details. Require integration/e2e
        coverage for persistence, queues, external-service boundaries, generated contracts,
        migrations, or user-visible workflows touched by the PR.'
    - mode: warning
      name: No Copy Paste Tables
      instructions: 'Pass/fail criteria: warn when a PR introduces hardcoded repetitive
        case lists, hand-maintained mapping tables, duplicate switch branches, or
        parallel arrays where a data-driven or generated structure would be more maintainable.
        Do not warn for small explicit protocol enums or tests where duplication clarifies
        cases.'
    - mode: warning
      name: No Hidden Fallback Path
      instructions: 'Pass/fail criteria: warn when code catches and silently falls
        back, adds compatibility wrappers, duplicate implementation paths, or default
        behavior that hides upstream failure unless the fallback is a documented product
        requirement with tests for both paths.'
    - mode: warning
      name: Observability Boundary
      instructions: 'Pass/fail criteria: warn when new services, background jobs,
        queues, network clients, storage writers, MCP tools, or agent workflows lack
        structured logging, tracing/metrics where the repository already uses them,
        or actionable error context.'
    - mode: warning
      name: Dependency Hygiene
      instructions: 'Pass/fail criteria: warn when dependencies are added without
        clear need, version pins drift from central package files, lockfile changes
        do not match manifest changes, transitive security-sensitive packages are
        introduced, or package manager conventions are violated.'
