code_generation:
  docstrings:
    language: en-US
    path_instructions:
    - path: "**/*.cs"
      instructions: Generate XML docs for public/protected APIs and package surfaces.
        Document intent, contracts, cancellation, exceptions, and compatibility. Do
        not add obvious comments to private implementation details.
    - path: "**/*.ts"
      instructions: Generate concise TSDoc only for exported APIs, hooks, reusable
        components, schemas, and non-obvious utility behavior. Avoid restating prop
        names.
    - path: "**/*.tsx"
      instructions: Generate concise TSDoc only for exported APIs, hooks, reusable
        components, schemas, and non-obvious utility behavior. Avoid restating prop
        names.
  unit_tests:
    path_instructions:
    - path: "**/*.cs"
      instructions: Use the repo test stack (xUnit v3/Microsoft Testing Platform where
        present). Prefer focused unit tests plus integration tests for persistence,
        queues, external clients, and generated contracts. Avoid sleeps; use fakes/signals.
    - path: "**/*.ts"
      instructions: Use the repo frontend test stack. Assert user-visible behavior
        and accessible roles/states. Avoid waitForTimeout and brittle snapshots.
    - path: "**/*.tsx"
      instructions: Use the repo frontend test stack. Assert user-visible behavior
        and accessible roles/states. Avoid waitForTimeout and brittle snapshots.
    - path: "**/*.py"
      instructions: Use pytest-style focused tests where a Python test stack exists.
        Mock network and filesystem boundaries unless explicitly live-gated.
issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
      - plan:auto
      - enhancement
      - bug
      - good-first-issue
      - help-wanted
  labeling:
    labeling_instructions:
    - label: bug
      instructions: Apply when the issue reports incorrect behavior, failing tests,
        regressions, or broken automation.
    - label: enhancement
      instructions: Apply when the issue asks for new capability or meaningful improvement.
    - label: documentation
      instructions: Apply when the issue is primarily about docs, examples, guides,
        or agent instructions.
    - label: security
      instructions: Apply when the issue involves secrets, auth, privacy, dependency
        risk, or exploitability.
    - label: dependencies
      instructions: Apply when the issue is about package, SDK, runtime, or lockfile
        updates.
    - label: good-first-issue
      instructions: Apply only when the issue is small, well-scoped, and low-risk
        for a new contributor or agent.
    auto_apply_labels: true