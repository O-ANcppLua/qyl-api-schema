schema_version: "1"
services:
  - service_name: qyl.collector
    profile_id: qyl-default
    declares:
      - kind: log
        name: qyl.collector.ingest
        attributes:
          - key: qyl.session.id
            requirement: recommended
      - kind: metric
        name: http.server.request.duration
        attributes:
          - key: http.request.method
            requirement: required
          - key: http.response.status_code
            requirement: recommended
      - kind: span
        name: http.server.request
        attributes:
          - key: http.request.method
            requirement: required
          - key: http.response.status_code
            requirement: recommended
          - key: url.path
            requirement: recommended
    exports:
      - exporter_id: collector-primary
        protocol: otlp_grpc
        endpoint_env_var: OTEL_EXPORTER_OTLP_ENDPOINT
        signals:
          - log
          - metric
          - span
  - service_name: qyl.dashboard
    profile_id: qyl-default
    declares:
      - kind: span
        name: http.client.request
        attributes:
          - key: http.request.method
            requirement: required
          - key: server.address
            requirement: recommended
    exports:
      - exporter_id: collector-primary
        protocol: otlp_http
        endpoint_env_var: QYL_OTLP_HTTP_ENDPOINT
        signals:
          - span
