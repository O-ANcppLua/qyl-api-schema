name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (alphanumerics, dot, underscore, hyphen). Leave blank to auto-pick (latest for stable releases, next for prereleases).'
        required: false
        default: ''

permissions:
  contents: read
  packages: write     # required to publish to GitHub Packages
  id-token: write     # required for npm provenance attestations

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: github-packages
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          # GitHub Packages npm registry — scope @o-ancpplua matches this repo's
          # GitHub org (O-ANcppLua, lowercased). Auth uses GITHUB_TOKEN below;
          # no NPM secret needs to live in repo settings.
          registry-url: 'https://npm.pkg.github.com'
          scope: '@o-ancpplua'
          always-auth: true

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          # Pinned patch (matches build/global.json) — don't float 10.0.x while actions are SHA-pinned.
          dotnet-version: '10.0.300'

      - name: Verify package.json is not private
        run: |
          if [ "$(node -p "require('./package.json').private || false")" = "true" ]; then
            echo "::error::package.json has \"private\": true — refusing to publish."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build local emitters
        run: npm run build:emitters

      - name: Lint TypeSpec (full surface)
        run: npm run lint

      - name: Lint TypeSpec (published surface only)
        run: npm run lint:public

      - name: Resolve npm dist-tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_TAG" ]; then
            dist_tag="$DISPATCH_TAG"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            dist_tag="next"
          else
            dist_tag="latest"
          fi
          if ! [[ "$dist_tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid npm dist-tag: $dist_tag (must match ^[A-Za-z0-9._-]+$)"
            exit 1
          fi
          echo "NPM_DIST_TAG=$dist_tag" >> "$GITHUB_ENV"
          echo "Resolved dist-tag: $dist_tag"

      # Pack + validate the C# contracts NuGet BEFORE the npm publish: npm versions are
      # immutable, so a pack/restore failure after npm publish would leave a release with only
      # one of the two lockstepped artifacts. Packing first lets the whole release fail cleanly.
      - name: Pack C# contracts NuGet (validate before npm publish)
        run: ./build.sh PackContractsNuget

      - name: Publish to GitHub Packages with provenance
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # Push the NuGet packed above (--skip avoids re-running the pack chain). NuGet has no
      # dist-tags: prereleases are encoded in the version and consumers opt in explicitly, so
      # there is no latest/next channel to gate here.
      - name: Push C# contracts NuGet
        run: ./build.sh PublishContractsNuget --skip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
