name: Nuke build verification

# Local-build verification gate. Complements (does NOT replace) publish.yml:
#   - publish.yml stays small + npm-direct so trusted-publishing OIDC keeps working
#     unchanged.
#   - nuke.yml runs the IDomainConventionsApi pipeline end-to-end (`./build.sh Check`)
#     to guarantee restore -> lockstep -> compile -> no-manual-edits -> emit-all ->
#     determinism -> pack all pass on a clean checkout.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read     # required to restore Nuke.OpenTelemetry.Conventions from GitHub Packages NuGet

concurrency:
  group: nuke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # build/NuGet.config has the org GitHub Packages feed as a packageSource and reads
      # these env vars in its <packageSourceCredentials> section.
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: build/global.json

      - name: Show toolchain
        run: |
          node --version
          npm --version
          dotnet --version

      - name: Run Nuke Check
        run: ./build.sh Check
